<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年第一次外勤人員檢測</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --primary: #1a6fa8; --primary-light: #2d8fce; --primary-pale: #e8f4fd;
    --primary-mid: #b3d9f5; --accent: #0e4f7a; --bg: #f0f7ff; --white: #ffffff;
    --text: #1e2d3d; --text-mid: #4a6580; --border: #c5dff0;
    --correct: #1a8a5a; --correct-bg: #e8f7f0; --wrong: #c0392b; --wrong-bg: #fdecea;
    --warn: #e53935; --shadow: 0 4px 20px rgba(26,111,168,0.12); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 18px;
    background-image: radial-gradient(circle at 10% 20%, rgba(45,143,206,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(26,111,168,0.06) 0%, transparent 40%); }
  #cover { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .cover-card { background: var(--white); border-radius: 24px; box-shadow: 0 8px 48px rgba(26,111,168,0.18); padding: 60px 56px; max-width: 540px; width: 100%; text-align: center; border-top: 6px solid var(--primary); }
  .cover-badge { display: inline-block; background: var(--primary-pale); color: var(--primary); font-size: 13px; font-weight: 600; letter-spacing: 2px; padding: 6px 18px; border-radius: 20px; margin-bottom: 24px; border: 1px solid var(--primary-mid); }
  .cover-title { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1.4; margin-bottom: 8px; }
  .cover-subtitle { font-size: 14px; color: var(--text-mid); margin-bottom: 40px; line-height: 1.6; }
  .cover-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 36px; text-align: left; }
  .info-box { background: var(--primary-pale); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .info-box label { display: block; font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .info-box input { width: 100%; border: none; background: transparent; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); outline: none; border-bottom: 2px solid var(--primary-mid); padding-bottom: 4px; transition: border-color 0.2s; }
  .info-box input:focus { border-bottom-color: var(--primary); }
  .info-box input::placeholder { color: #aac4d8; }
  .cover-rules { background: var(--primary-pale); border-radius: 10px; padding: 16px 20px; margin-bottom: 32px; text-align: left; border-left: 4px solid var(--primary); }
  .cover-rules p { font-size: 13px; color: var(--text-mid); line-height: 1.8; }
  .cover-rules strong { color: var(--primary); }
  .btn-start { background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; border: none; padding: 16px 48px; border-radius: 50px; font-size: 17px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; box-shadow: 0 6px 24px rgba(26,111,168,0.35); transition: all 0.2s; letter-spacing: 1px; }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(26,111,168,0.4); }
  #exam { display: none; }
  .exam-header { background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%); color: white; padding: 20px 32px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(14,79,122,0.3); }
  .exam-header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .exam-htitle { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  .exam-usertag { font-size: 13px; opacity: 0.85; }
  .progress-bar-wrap { background: rgba(255,255,255,0.2); border-radius: 20px; height: 6px; flex: 1; min-width: 120px; max-width: 260px; }
  .progress-bar-fill { background: #7ee8fa; height: 100%; border-radius: 20px; transition: width 0.3s; width: 0%; }
  .answered-count { font-size: 13px; white-space: nowrap; font-weight: 600; }
  .exam-body { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin: 40px 0 20px; flex-wrap: wrap; }
  .section-header:first-child { margin-top: 0; }
  .section-badge { background: var(--primary); color: white; font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; letter-spacing: 1px; white-space: nowrap; }
  .section-title { font-size: 17px; font-weight: 700; color: var(--accent); }
  .section-rule { font-size: 12px; color: var(--text-mid); background: var(--primary-pale); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .q-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 14px; border: 1.5px solid transparent; transition: border-color 0.2s, box-shadow 0.2s; }
  .q-card:hover { box-shadow: 0 6px 28px rgba(26,111,168,0.16); }
  .q-card.answered { border-color: var(--primary-mid); }
  .q-card.correct-card { border-color: var(--correct); background: var(--correct-bg); }
  .q-card.wrong-card { border-color: var(--wrong); background: var(--wrong-bg); }
  .q-num { display: inline-flex; align-items: center; justify-content: center; background: var(--primary); color: white; font-size: 11px; font-weight: 700; min-width: 26px; height: 26px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.7; color: var(--text); display: flex; align-items: flex-start; }
  .q-text-content { flex: 1; }
  .q-options { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .opt-label { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; font-size: 14px; color: var(--text); background: var(--bg); }
  .opt-label:hover { border-color: var(--primary-light); background: var(--primary-pale); }
  .opt-label input[type=radio], .opt-label input[type=checkbox] { accent-color: var(--primary); width: 16px; height: 16px; flex-shrink: 0; }
  .tf-options { display: flex; gap: 12px; margin-top: 12px; }
  .tf-btn { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 600; transition: all 0.15s; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .tf-btn:hover { border-color: var(--primary-light); background: var(--primary-pale); }
  .tf-btn.selected { background: #d0eaf9; border: 2.5px solid var(--primary); color: var(--primary); font-weight: 700; box-shadow: inset 0 0 0 1px var(--primary); }
  .opt-label:has(input:checked) { background: #d0eaf9; border: 2.5px solid var(--primary); color: var(--primary); font-weight: 600; box-shadow: inset 0 0 0 1px var(--primary); }
  .essay-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); resize: vertical; min-height: 100px; outline: none; background: var(--bg); transition: border-color 0.2s; margin-top: 12px; }
  .essay-textarea:focus { border-color: var(--primary); background: white; }
  .submit-wrap { text-align: center; margin-top: 48px; }
  .btn-submit { background: linear-gradient(135deg, var(--primary-light), var(--accent)); color: white; border: none; padding: 18px 64px; border-radius: 50px; font-size: 18px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; box-shadow: 0 8px 32px rgba(14,79,122,0.35); transition: all 0.2s; letter-spacing: 1px; }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(14,79,122,0.4); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  #result { display: none; }
  .result-header { background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%); color: white; padding: 40px 32px; text-align: center; }
  .result-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .result-header p { font-size: 14px; opacity: 0.85; }
  .result-body { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
  .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .score-cell { background: var(--white); border-radius: 12px; padding: 20px 16px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid var(--primary-mid); }
  .score-cell.total-cell { border-top-color: var(--primary); background: var(--primary-pale); }
  .score-cell .sc-label { font-size: 12px; color: var(--text-mid); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
  .score-cell .sc-val { font-size: 28px; font-weight: 800; color: var(--primary); font-family: 'Nunito', sans-serif; }
  .score-cell.total-cell .sc-val { font-size: 34px; color: var(--accent); }
  .score-cell .sc-max { font-size: 12px; color: var(--text-mid); margin-top: 2px; }
  .progress-big { background: var(--white); border-radius: 12px; padding: 20px 24px; box-shadow: var(--shadow); margin-bottom: 28px; }
  .progress-big-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-mid); margin-bottom: 10px; font-weight: 600; }
  .progress-big-bar { background: var(--bg); border-radius: 20px; height: 18px; overflow: hidden; }
  .progress-big-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--primary-light), var(--primary)); transition: width 1s ease-out; }
  .warn-notice { background: #fff5f5; border: 2px solid var(--warn); border-radius: 12px; padding: 18px 24px; text-align: center; margin-bottom: 32px; }
  .warn-notice p { color: var(--warn); font-size: 16px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.6; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(14,79,122,0.7); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 20px; color: white; font-size: 16px; font-weight: 600; }
  .overlay.show { display: flex; }
  .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .multi-hint { font-size: 12px; color: var(--primary); background: var(--primary-pale); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-top: 4px; margin-bottom: 4px; }
  .divider { border: none; border-top: 2px dashed var(--border); margin: 8px 0 24px; }
  .send-confirm { background: #e6f9f0; border: 2px solid var(--correct); border-radius: 12px; padding: 14px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--correct); }
  .send-confirm-icon { font-size: 20px; background: var(--correct); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .warn-notice p { color: var(--warn); font-size: 16px; font-weight: 800; letter-spacing: 0.5px; line-height: 1.6; }
  @media (max-width: 600px) { .cover-card { padding: 36px 24px; } .cover-info-grid { grid-template-columns: 1fr; } .exam-htitle { font-size: 15px; } .score-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div id="cover">
  <div class="cover-card">
    <h1 class="cover-title">2026年第一次<br>外勤人員職能檢測</h1>
    <p class="cover-subtitle">請填寫基本資料後開始作答</p>
    <div class="cover-info-grid">
      <div class="info-box">
        <label>部門</label>
        <input type="text" id="inp-dept" placeholder="請輸入部門名稱" autocomplete="off">
      </div>
      <div class="info-box">
        <label>英文姓名</label>
        <input type="text" id="inp-name" placeholder="English Name" autocomplete="off">
      </div>
    </div>
    <div class="cover-rules">
      <p>
        <strong>學科 50 題</strong>（是非 10 ＋ 選擇 25 ＋ 複選 15）<br>
        複選題須全部正確方可得分・作答完畢後請提交測驗
      </p>
    </div>
    <button class="btn-start" onclick="startExam()">開始作答 →</button>
  </div>
</div>

<div id="exam">
  <div class="exam-header">
    <div class="exam-header-inner">
      <div>
        <div class="exam-htitle">2026年第一次外勤人員職能檢測</div>
        <div class="exam-usertag" id="user-tag">—</div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill"></div></div>
      <div class="answered-count" id="ans-count">0 / 54</div>
    </div>
  </div>
  <div class="exam-body" id="exam-body"></div>
  <div class="submit-wrap">
    <button class="btn-submit" id="btn-submit" onclick="submitExam()">提交測驗</button>
  </div>
</div>

<div id="result">
  <div class="result-header">
    <h2>測驗結果 · 2026年第一次外勤人員職能檢測</h2>
    <p id="result-user-tag">—</p>
  </div>
  <div class="result-body">
    <div class="send-confirm" id="send-confirm" style="display:none">
      <span class="send-confirm-icon">✓</span> 已執行傳送動作
    </div>
    <div class="score-grid" id="score-grid"></div>
    <div class="progress-big">
      <div class="progress-big-label"><span>學科得分</span><span id="pct-label">0%</span></div>
      <div class="progress-big-bar"><div class="progress-big-fill" id="prog-big" style="width:0%"></div></div>
    </div>
    <div class="warn-notice">
      <p>⚠️ 請勿關閉網頁，請通知人事確認測驗結果！</p>
    </div>
    <hr class="divider">
    <div id="review-area"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div>正在提交測驗，請稍候…</div>
</div>

<script>
const TF_BANK = [
  { q: "每週一為全體會議時間。", ans: false },
  { q: "同仁若於非正常下班時間（如：請假提早下班）離開公司，無論使用人臉辨識、指紋機或打卡機，直接打卡即可。", ans: false },
  { q: "在安全的室內等待救援時，如果門後有煙，應該要趕快把門、窗打開通風。", ans: false },
  { q: "車輛違規肇事者，依公司規定予以處分，違規罰款部分由駕駛人自行負責；違規記點，公司會向《台中市交通事件裁決處》申請轉移至違規汽車駕駛人。", ans: true },
  { q: "發生火災時，若發現受困環境中煙霧瀰漫，應採取高姿態快速奔跑，以爭取逃生時間。", ans: false },
  { q: "同仁對於薪資計算結果或薪資單明細如有疑義，應直接向財務課出納人員尋求諮詢與更正。", ans: false },
  { q: "關於公司軟體與資料安全，同仁可視個人需求擅自安裝軟體，或將公司擁有的軟體及資料拷貝至外部使用。", ans: false },
  { q: "同仁因公需往返外地且【無公務車】可使用時，經部門主管呈報上級主管同意者，不限職位，均得以台灣高鐵【標準車廂】之憑證核實報銷，外勤單位駐點、交接、輪休不適用此條文。", ans: true },
  { q: "雇主對勞工應施以從事工作與預防災變所必要之安全衛生教育及訓練，勞工對於安全衛生教育及訓練，有接受之義務。", ans: true },
  { q: "臨時請假須提前報備，事後回報不得用特休與榮譽假。", ans: true },
  { q: "依據「道路交通管理處罰條例」第33條規定：行駛途中，若有車輪、輪胎膠皮或車輛機件脫落、輪胎任一點胎紋深度不足等情事，可處駕駛人新臺幣3000元～6000元罰鍰；而車輛缺水、缺油等問題，可處新臺幣600～1200元罰鍰。", ans: true },
  { q: "火是火場中最大的殺手。", ans: false },
  { q: "由資材部規劃的年度盤點為公司重大活動，考量盤點人力上的調度與支援，於盤點期間實施管制休假。", ans: true },
  { q: "若在辦公室發現初期小火，而周圍安全的情況下可先拿滅火器滅火。", ans: true },
  { q: "當因公務需求出外勤時，不論是否為上班時間，皆需要於iNET系統作回報。", ans: true },
  { q: "當日上班後如臨時請假，經部門主管核准後，下班時不用打下班卡。", ans: false },
  { q: "若同仁提出加班，僅可選擇「補休」方式；且補休需於申請加班之次月底前休畢，如因故無法休畢且無提出申訴，則折合薪資加班費發給。", ans: false },
  { q: "同仁離開原先辦公區域樓層，應於iNET系統進行「樓層移動」，以確保人事單位即時掌握同仁動向。", ans: true },
  { q: "駕駛公務車應注意行車安全並嚴禁酒後駕車；此外，為維護車內環境，應隨時保持車內清潔並全面禁菸。", ans: true },
  { q: "E系列只有使用公司的遊戲？", ans: false }
];

const SC1_BANK = [
  { q: "百家二代遊戲中，累積獎中獎條件為「莊閒對子」時，若玩家欲得到累積獎，請問必需針對下列哪些項目做押注？", opts: ["莊家、閒家及和","以上皆可","閒家對子與莊家對子","莊家與閒家"], ans: 2 },
  { q: "百家樂遊戲中，每場開牌的牌路組合稱為？", opts: ["前場紀錄","路單","統計表","電子看板"], ans: 1 },
  { q: "關於雀神滿天下抽佣，何者有誤？", opts: ["抽佣為0~30%","不管輸贏都要被抽","不同廳可設定不同的抽佣%數","僅抽贏家"], ans: 1 },
  { q: "設定浮球機四個時間模組（開球的時間差）真的可以影響賓果的公平性嗎？", opts: ["經店家說有影響，即可影響","可以","看設定是否開放","不可以"], ans: 3 },
  { q: "輪盤遊戲中，選擇其中一個號碼後，電腦自動再押前後各二個號碼為何種押注方式？", opts: ["相鄰投注","輪盤下角注","零旁投注-少","零旁投注-多"], ans: 0 },
  { q: "百家樂遊戲中，一場遊戲「最多」發幾張牌？", opts: ["4張牌","6張牌","2張牌","8張牌"], ans: 1 },
  { q: "Casino3 T系列百家遊戲在新換局設定中，哪一張牌面會被視為切牌張數？", opts: ["第五張牌面","隨機一張牌","第一張牌面","最後一張牌面"], ans: 2 },
  { q: "五代洗牌機中，5.2代是安裝何種項目稱之？", opts: ["主動式壓牌桿","10吋觸控螢幕","恆光模組","FRW-K10-20"], ans: 1 },
  { q: "五代洗牌機中，主動式壓牌桿是為幾代？", opts: ["5.1","5.2","5.5","5.3"], ans: 2 },
  { q: "關於雀神滿天下，何者正確？", opts: ["該場分數不足賠分時，下次登入會把不足的扣回來","抽佣為整個伺服器統一%數","該場分數不足賠分時，僅賠剩餘分數","抽佣最高可抽40%"], ans: 2 },
  { q: "下列何者為R200、R220骰寶機檯的A級更新項目？", opts: ["骰盅","骰子","霍爾開關","恆光模組"], ans: 3 },

// ─── STATE ───────────────────────────────────
let drawn = { tf: [], sc1: [], sc2: [], mc: [] };
let submitted = false;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) {
  return shuffle(arr.map((_, i) => i)).slice(0, n).sort((a, b) => a - b);
}

function startExam() {
  const dept = document.getElementById('inp-dept').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  if (!dept || !name) { alert('請填寫部門與英文姓名後再開始！'); return; }
  drawn.tf  = pickN(TF_BANK, 10);
  drawn.sc1 = pickN(SC1_BANK, 10);
  drawn.sc2 = pickN(SC2_BANK, 15);
  drawn.mc  = pickN(MC_BANK, 15);
  document.getElementById('user-tag').textContent = `部門：${dept}　姓名：${name}`;
  document.getElementById('cover').style.display = 'none';
  document.getElementById('exam').style.display = 'block';
  renderExam();
  updateProgress();
}

function renderExam() {
  const body = document.getElementById('exam-body');
  let html = '';
  let qNum = 1;
  const OL = 'ABCDE';

  // T/F
  html += sectionHdr('是非題');
  drawn.tf.forEach((idx, i) => {
    const q = TF_BANK[idx];
    html += `<div class="q-card" id="qc-tf-${i}">
      <div class="q-text"><span class="q-num">${qNum++}</span><span class="q-text-content">${q.q}</span></div>
      <div class="tf-options">
        <button class="tf-btn" id="tf-${i}-T" onclick="selTF(${i},'T')">○ 正確</button>
        <button class="tf-btn" id="tf-${i}-F" onclick="selTF(${i},'F')">✕ 錯誤</button>
      </div></div>`;
  });

  // SC1
  html += sectionHdr('選擇題');
  drawn.sc1.forEach((idx, i) => { html += buildSC('sc1', i, qNum++, SC1_BANK[idx], OL); });

  // SC2
  drawn.sc2.forEach((idx, i) => { html += buildSC('sc2', i, qNum++, SC2_BANK[idx], OL); });

  // MC
  html += sectionHdr('複選題');
  drawn.mc.forEach((idx, i) => {
    const q = MC_BANK[idx];
    const opts = q.opts.map((o, oi) =>
      `<label class="opt-label"><input type="checkbox" name="mc-${i}" value="${oi}" onchange="markAns('qc-mc-${i}')"> ${OL[oi]}. ${o}</label>`
    ).join('');
    html += `<div class="q-card" id="qc-mc-${i}">
      <div class="q-text"><span class="q-num">${qNum++}</span><span class="q-text-content">${q.q}</span></div>
      <span class="multi-hint">☑ 複選題，請勾選所有正確答案</span>
      <div class="q-options">${opts}</div></div>`;
  });

  body.innerHTML = html;
}

function sectionHdr(badge) {
  return `<div class="section-header"><span class="section-badge">${badge}</span></div>`;
}

function buildSC(type, i, qNum, q, OL) {
  const opts = q.opts.map((o, oi) =>
    `<label class="opt-label"><input type="radio" name="${type}-${i}" value="${oi}" onchange="markAns('qc-${type}-${i}')"> ${OL[oi]}. ${o}</label>`
  ).join('');
  return `<div class="q-card" id="qc-${type}-${i}">
    <div class="q-text"><span class="q-num">${qNum}</span><span class="q-text-content">${q.q}</span></div>
    <div class="q-options">${opts}</div></div>`;
}

function selTF(i, val) {
  ['T','F'].forEach(v => document.getElementById(`tf-${i}-${v}`).classList.remove('selected'));
  document.getElementById(`tf-${i}-${val}`).classList.add('selected');
  document.getElementById(`qc-tf-${i}`).classList.add('answered');
  updateProgress();
}

function markAns(cardId) {
  document.getElementById(cardId).classList.add('answered');
  updateProgress();
}

function getTFVal(i) {
  if (document.getElementById(`tf-${i}-T`).classList.contains('selected')) return true;
  if (document.getElementById(`tf-${i}-F`).classList.contains('selected')) return false;
  return null;
}

function getSCVal(type, i) {
  const r = document.querySelector(`input[name="${type}-${i}"]:checked`);
  return r ? parseInt(r.value) : null;
}

function getMCVal(i) {
  return Array.from(document.querySelectorAll(`input[name="mc-${i}"]:checked`)).map(c => parseInt(c.value)).sort((a,b)=>a-b);
}

function countAnswered() {
  let c = 0;
  drawn.tf.forEach((_,i) => { if(getTFVal(i)!==null) c++; });
  drawn.sc1.forEach((_,i) => { if(getSCVal('sc1',i)!==null) c++; });
  drawn.sc2.forEach((_,i) => { if(getSCVal('sc2',i)!==null) c++; });
  drawn.mc.forEach((_,i) => { if(getMCVal(i).length>0) c++; });
  return c;
}

function updateProgress() {
  const total = 50;
  const cnt = countAnswered();
  document.getElementById('ans-count').textContent = `${cnt} / ${total}`;
  document.getElementById('prog-fill').style.width = `${(cnt/total)*100}%`;
}

function submitExam() {
  if (submitted) return;
  const unanswered = 50 - countAnswered();
  if (unanswered > 0 && !confirm(`目前有 ${unanswered} 題未作答，確定要提交嗎？`)) return;
  submitted = true;
  document.getElementById('btn-submit').disabled = true;

  let tfScore=0, sc1Score=0, sc2Score=0, mcScore=0;
  drawn.tf.forEach((idx,i) => { if(getTFVal(i)===TF_BANK[idx].ans) tfScore++; });
  drawn.sc1.forEach((idx,i) => { if(getSCVal('sc1',i)===SC1_BANK[idx].ans) sc1Score++; });
  drawn.sc2.forEach((idx,i) => { if(getSCVal('sc2',i)===SC2_BANK[idx].ans) sc2Score++; });
  drawn.mc.forEach((idx,i) => {
    const ua = getMCVal(i);
    const ca = [...MC_BANK[idx].ans].sort((a,b)=>a-b);
    if (JSON.stringify(ua)===JSON.stringify(ca)) mcScore++;
  });

  const correct = tfScore+sc1Score+sc2Score+mcScore;
  const total = correct * 2;
  const pct = total;
  const dept = document.getElementById('inp-dept').value.trim();
  const name = document.getElementById('inp-name').value.trim();

  // 鎖定所有題目選項，防止重複修改
  document.querySelectorAll('.tf-btn, .opt-label input').forEach(el => el.disabled = true);
  document.querySelectorAll('.tf-btn').forEach(el => el.style.pointerEvents = 'none');

  document.getElementById('overlay').classList.add('show');

  const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSd1NMf4TOQvqhRvRdcY4vui2Ed0WHzrqkBY0RrVQfVklE6SZg/formResponse';
  const formData = new FormData();
  formData.append('entry.1913681111', name);
  formData.append('entry.1692840277', dept);
  formData.append('entry.1341732725', total.toString());

  fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: formData })
    .catch(() => {})
    .finally(() => {
      document.getElementById('overlay').classList.remove('show');
      showResults(tfScore, sc1Score, sc2Score, mcScore, total, pct, dept, name);
    });
}

function showResults(tfScore, sc1Score, sc2Score, mcScore, total, pct, dept, name) {
  document.getElementById('exam').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('result-user-tag').textContent = `部門：${dept}　姓名：${name}`;

  // 已執行傳送動作提示
  document.getElementById('send-confirm').style.display = 'flex';

  document.getElementById('score-grid').innerHTML = `
    <div class="score-cell total-cell"><div class="sc-label">學科總分</div><div class="sc-val">${total}</div><div class="sc-max">滿分 100 分</div></div>`;

  document.getElementById('pct-label').textContent = `${total} 分`;
  setTimeout(() => { document.getElementById('prog-big').style.width = `${pct}%`; }, 100);

  const OL = 'ABCDE';
  let rev = '';

  // T/F review
  rev += `<div class="section-header"><span class="section-badge">是非題</span></div>`;
  drawn.tf.forEach((idx, i) => {
    const q = TF_BANK[idx]; const ua = getTFVal(i); const ok = ua === q.ans;
    rev += `<div class="q-card ${ok?'correct-card':'wrong-card'}">
      <div class="q-text"><span class="q-num" style="background:${ok?'var(--correct)':'var(--wrong)'}">${i+1}</span><span class="q-text-content">${q.q}</span></div>
      <div style="margin-top:10px;font-size:13px;display:flex;gap:20px;flex-wrap:wrap">
        <span>你的答案：<strong>${ua===null?'（未作答）':ua?'○ 正確':'✕ 錯誤'}</strong></span>
        <span>正確答案：<strong style="color:var(--correct)">${q.ans?'○ 正確':'✕ 錯誤'}</strong></span>
        <span style="font-weight:700;color:${ok?'var(--correct)':'var(--wrong)'}">${ok?'✓ 答對':'✗ 答錯'}</span>
      </div></div>`;
  });

  // SC review (combined)
  rev += `<div class="section-header"><span class="section-badge">選擇題</span></div>`;
  drawn.sc1.forEach((idx, i) => {
    const q = SC1_BANK[idx]; const ua = getSCVal('sc1',i); const ok = ua===q.ans;
    rev += buildSCRev(q, ua, q.ans, ok, i+1, OL);
  });
  drawn.sc2.forEach((idx, i) => {
    const q = SC2_BANK[idx]; const ua = getSCVal('sc2',i); const ok = ua===q.ans;
    rev += buildSCRev(q, ua, q.ans, ok, drawn.sc1.length+i+1, OL);
  });

  // MC review
  rev += `<div class="section-header"><span class="section-badge">複選題</span></div>`;
  drawn.mc.forEach((idx, i) => {
    const q = MC_BANK[idx]; const ua = getMCVal(i);
    const ca = [...q.ans].sort((a,b)=>a-b);
    const ok = JSON.stringify(ua)===JSON.stringify(ca);
    const uStr = ua.length ? ua.map(x=>OL[x]).join('、') : '（未作答）';
    const cStr = ca.map(x=>`${OL[x]}. ${q.opts[x]}`).join('；');
    rev += `<div class="q-card ${ok?'correct-card':'wrong-card'}">
      <div class="q-text"><span class="q-num" style="background:${ok?'var(--correct)':'var(--wrong)'}">${i+1}</span><span class="q-text-content">${q.q}</span></div>
      <div style="margin-top:10px;font-size:13px">
        <div>你的答案：<strong>${uStr}</strong></div>
        <div>正確答案：<strong style="color:var(--correct)">${cStr}</strong></div>
        <div style="font-weight:700;color:${ok?'var(--correct)':'var(--wrong)'};margin-top:4px">${ok?'✓ 全對得分':'✗ 未全對，不得分'}</div>
      </div></div>`;
  });

  document.getElementById('review-area').innerHTML = rev;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildSCRev(q, ua, ca, ok, num, OL) {
  const uStr = ua===null ? '（未作答）' : `${OL[ua]}. ${q.opts[ua]}`;
  const cStr = `${OL[ca]}. ${q.opts[ca]}`;
  return `<div class="q-card ${ok?'correct-card':'wrong-card'}">
    <div class="q-text"><span class="q-num" style="background:${ok?'var(--correct)':'var(--wrong)'}">${num}</span><span class="q-text-content">${q.q}</span></div>
    <div style="margin-top:10px;font-size:13px">
      <div>你的答案：<strong>${uStr}</strong></div>
      <div>正確答案：<strong style="color:var(--correct)">${cStr}</strong></div>
      <div style="font-weight:700;color:${ok?'var(--correct)':'var(--wrong)'};margin-top:4px">${ok?'✓ 答對':'✗ 答錯'}</div>
    </div></div>`;
}
</script>
